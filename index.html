<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pottery Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Lora', serif;
            background: linear-gradient(135deg, #faf8f3 0%, #f5ede4 100%);
            color: #2c2416;
            min-height: 100vh;
            padding: 24px;
        }
        
        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 48px;
        }
        
        header h1 {
            font-size: 48px;
            color: #2c2416;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }
        
        header p {
            font-size: 18px;
            color: #8b7d72;
        }
        
        .kanban-board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }
        
        .column {
            background: white;
            border-radius: 16px;
            border: 2px solid #e8d5c4;
            padding: 24px;
            min-height: 600px;
            display: flex;
            flex-direction: column;
        }
        
        .column-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f0e6d8;
        }
        
        .column-icon {
            font-size: 28px;
        }
        
        .column-title {
            font-size: 20px;
            font-weight: 700;
            color: #2c2416;
        }
        
        .column-count {
            margin-left: auto;
            background: #f0e6d8;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            color: #8b7d72;
            font-weight: 600;
        }
        
        .cards-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
        }
        
        .card {
            background: linear-gradient(135deg, #faf8f3 0%, #f5ede4 100%);
            border: 1.5px solid #e8d5c4;
            border-radius: 12px;
            padding: 16px;
            cursor: grab;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(201, 149, 111, 0.15);
            border-color: #d4c4b0;
        }
        
        .card:active {
            cursor: grabbing;
        }
        
        .card-image {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #e8d5c4 0%, #d4c4b0 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            overflow: hidden;
            position: relative;
        }
        
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .card-image.empty {
            color: #c9956f;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: #2c2416;
            word-break: break-word;
        }
        
        .card-description {
            font-size: 13px;
            color: #8b7d72;
            line-height: 1.4;
            word-break: break-word;
        }
        
        .card-dates {
            font-size: 12px;
            color: #a89d92;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .card-date {
            display: flex;
            justify-content: space-between;
        }
        
        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        
        .btn-small {
            flex: 1;
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-family: 'Lora', serif;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
        }
        
        .btn-edit {
            background: #c9956f;
            color: white;
        }
        
        .btn-edit:hover {
            background: #b8845f;
        }
        
        .btn-delete {
            background: #e8d5c4;
            color: #8b4513;
        }
        
        .btn-delete:hover {
            background: #d4c4b0;
        }
        
        .add-card-btn {
            width: 100%;
            padding: 12px;
            background: #f0e6d8;
            border: 2px dashed #d4c4b0;
            border-radius: 8px;
            font-family: 'Lora', serif;
            font-size: 14px;
            color: #8b7d72;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            margin-top: auto;
        }
        
        .add-card-btn:hover {
            background: #e8d5c4;
            border-color: #c9956f;
            color: #c9956f;
        }
        
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .modal-header {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
            color: #2c2416;
        }
        
        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #2c2416;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            padding: 12px;
            border: 1.5px solid #e8d5c4;
            border-radius: 8px;
            font-family: 'Lora', serif;
            font-size: 14px;
            color: #2c2416;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #c9956f;
            box-shadow: 0 0 0 3px rgba(201, 149, 111, 0.1);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .image-preview {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #f5ede4 0%, #e8d5c4 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            overflow: hidden;
            font-size: 48px;
        }
        
        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }
        
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-family: 'Lora', serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: #c9956f;
            color: white;
        }
        
        .btn-primary:hover {
            background: #b8845f;
        }
        
        .btn-secondary {
            background: #f0e6d8;
            color: #8b7d72;
        }
        
        .btn-secondary:hover {
            background: #e8d5c4;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #a89d92;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .empty-state-text {
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            header h1 {
                font-size: 32px;
            }
            
            .kanban-board {
                grid-template-columns: 1fr;
            }
            
            .modal-content {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 Pottery Journal</h1>
            <p>Track your ceramic pieces through every stage of creation</p>
        </header>
        
        <div class="kanban-board">
            <div class="column" id="thrown">
                <div class="column-header">
                    <span class="column-icon">🎯</span>
                    <span class="column-title">Thrown</span>
                    <span class="column-count" id="count-thrown">0</span>
                </div>
                <div class="cards-container" id="cards-thrown"></div>
                <button class="add-card-btn" onclick="openModal('thrown')">+ Add Piece</button>
            </div>
            
            <div class="column" id="trimmed">
                <div class="column-header">
                    <span class="column-icon">✂️</span>
                    <span class="column-title">Trimmed</span>
                    <span class="column-count" id="count-trimmed">0</span>
                </div>
                <div class="cards-container" id="cards-trimmed"></div>
                <button class="add-card-btn" onclick="openModal('trimmed')">+ Add Piece</button>
            </div>
            
            <div class="column" id="bisque">
                <div class="column-header">
                    <span class="column-icon">🔥</span>
                    <span class="column-title">Bisque Fired</span>
                    <span class="column-count" id="count-bisque">0</span>
                </div>
                <div class="cards-container" id="cards-bisque"></div>
                <button class="add-card-btn" onclick="openModal('bisque')">+ Add Piece</button>
            </div>
            
            <div class="column" id="glazed">
                <div class="column-header">
                    <span class="column-icon">🎨</span>
                    <span class="column-title">Glazed</span>
                    <span class="column-count" id="count-glazed">0</span>
                </div>
                <div class="cards-container" id="cards-glazed"></div>
                <button class="add-card-btn" onclick="openModal('glazed')">+ Add Piece</button>
            </div>
            
            <div class="column" id="fired">
                <div class="column-header">
                    <span class="column-icon">✨</span>
                    <span class="column-title">Glaze Fired</span>
                    <span class="column-count" id="count-fired">0</span>
                </div>
                <div class="cards-container" id="cards-fired"></div>
                <button class="add-card-btn" onclick="openModal('fired')">+ Add Piece</button>
            </div>
        </div>
    </div>
    
    <!-- Add/Edit Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header" id="modal-title">Add New Piece</div>
            
            <div class="image-preview" id="image-preview">
                <span>📸</span>
            </div>
            
            <div class="form-group">
                <label>Upload Image</label>
                <input type="file" id="image-input" accept="image/*" onchange="previewImage()">
            </div>
            
            <div class="form-group">
                <label>Piece Name *</label>
                <input type="text" id="piece-name" placeholder="e.g., Thrown Bowl">
            </div>
            
            <div class="form-group">
                <label>Description</label>
                <textarea id="piece-description" placeholder="Add notes about your piece..."></textarea>
            </div>
            
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="piece-date">
            </div>
            

            
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="savePiece()">Save Piece</button>
            </div>
        </div>
    </div>
    
    <script>
        // Initialize data from localStorage
        let pieces = JSON.parse(localStorage.getItem('pottery-pieces')) || [];
        let currentColumn = null;
        let editingId = null;
        
        const columns = ['thrown', 'trimmed', 'bisque', 'glazed', 'fired'];
        
        function renderBoard() {
            columns.forEach(column => {
                const columnPieces = pieces.filter(p => p.column === column);
                const container = document.getElementById(`cards-${column}`);
                const count = document.getElementById(`count-${column}`);
                
                count.textContent = columnPieces.length;
                
                if (columnPieces.length === 0) {
                    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">✨</div><div class="empty-state-text">No pieces yet</div></div>';
                } else {
                    container.innerHTML = columnPieces.map(piece => `
                        <div class="card" draggable="true" ondragstart="dragStart(event, '${piece.id}')" ondragend="dragEnd(event)">
                            <div class="card-image ${!piece.image ? 'empty' : ''}">
                                ${piece.image ? `<img src="${piece.image}" alt="${piece.name}">` : '🎨'}
                            </div>
                            <div class="card-title">${piece.name}</div>
                            ${piece.description ? `<div class="card-description">${piece.description}</div>` : ''}
                            ${piece.date ? `<div class="card-dates"><div class="card-date"><span>📅</span><span>${piece.date}</span></div></div>` : ''}
                            <div class="card-actions">
                                ${column !== 'fired' ? `<button class="btn-small btn-edit" onclick="moveToNext('${piece.id}')">→ Next</button>` : ''}
                                <button class="btn-small btn-edit" onclick="editPiece('${piece.id}')">Edit</button>
                                <button class="btn-small btn-delete" onclick="deletePiece('${piece.id}')">Delete</button>
                            </div>
                        </div>
                    `).join('');
                }
            });
        }
        
        function openModal(column) {
            currentColumn = column;
            editingId = null;
            document.getElementById('modal-title').textContent = 'Add New Piece';
            document.getElementById('piece-name').value = '';
            document.getElementById('piece-description').value = '';
            document.getElementById('piece-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('image-input').value = '';
            document.getElementById('image-preview').innerHTML = '<span>📸</span>';
            document.getElementById('modal').classList.add('active');
        }
        
        function editPiece(id) {
            const piece = pieces.find(p => p.id === id);
            if (!piece) return;
            
            editingId = id;
            currentColumn = piece.column;
            document.getElementById('modal-title').textContent = 'Edit Piece';
            document.getElementById('piece-name').value = piece.name;
            document.getElementById('piece-description').value = piece.description || '';
            document.getElementById('piece-date').value = piece.date || '';
            
            if (piece.image) {
                document.getElementById('image-preview').innerHTML = `<img src="${piece.image}" alt="${piece.name}">`;
            } else {
                document.getElementById('image-preview').innerHTML = '<span>📸</span>';
            }
            
            document.getElementById('modal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            currentColumn = null;
            editingId = null;
        }
        
        function previewImage() {
            const file = document.getElementById('image-input').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('image-preview').innerHTML = `<img src="${e.target.result}" alt="preview">`;
                };
                reader.readAsDataURL(file);
            }
        }
        
        function savePiece() {
            const name = document.getElementById('piece-name').value.trim();
            if (!name) {
                alert('Please enter a piece name');
                return;
            }
            
            const imageInput = document.getElementById('image-input');
            const description = document.getElementById('piece-description').value;
            const date = document.getElementById('piece-date').value;
            
            if (editingId) {
                // Update existing piece
                const piece = pieces.find(p => p.id === editingId);
                if (piece) {
                    piece.name = name;
                    piece.description = description;
                    piece.date = date;
                    piece.column = currentColumn;
                    
                    if (imageInput.files[0]) {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            piece.image = e.target.result;
                            saveToDB();
                            renderBoard();
                            closeModal();
                        };
                        reader.readAsDataURL(imageInput.files[0]);
                    } else {
                        saveToDB();
                        renderBoard();
                        closeModal();
                    }
                }
            } else {
                // Create new piece
                const newPiece = {
                    id: Date.now().toString(),
                    name,
                    description,
                    date,
                    column: currentColumn,
                    image: null
                };
                
                if (imageInput.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        newPiece.image = e.target.result;
                        pieces.push(newPiece);
                        saveToDB();
                        renderBoard();
                        closeModal();
                    };
                    reader.readAsDataURL(imageInput.files[0]);
                } else {
                    pieces.push(newPiece);
                    saveToDB();
                    renderBoard();
                    closeModal();
                }
            }
        }
        
        function deletePiece(id) {
            if (confirm('Are you sure you want to delete this piece?')) {
                pieces = pieces.filter(p => p.id !== id);
                saveToDB();
                renderBoard();
            }
        }
        
        function moveToNext(id) {
            const piece = pieces.find(p => p.id === id);
            if (!piece) return;
            
            const columnOrder = ['thrown', 'trimmed', 'bisque', 'glazed', 'fired'];
            const currentIndex = columnOrder.indexOf(piece.column);
            
            if (currentIndex < columnOrder.length - 1) {
                piece.column = columnOrder[currentIndex + 1];
                saveToDB();
                renderBoard();
            }
        }
        
        function dragStart(e, id) {
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('pieceId', id);
        }
        
        function dragEnd(e) {
            e.preventDefault();
        }
        
        function allowDrop(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }
        
        function drop(e, column) {
            e.preventDefault();
            const pieceId = e.dataTransfer.getData('pieceId');
            const piece = pieces.find(p => p.id === pieceId);
            if (piece) {
                piece.column = column;
                saveToDB();
                renderBoard();
            }
        }
        
        function saveToDB() {
            localStorage.setItem('pottery-pieces', JSON.stringify(pieces));
        }
        
        // Add drag and drop to columns
        columns.forEach(column => {
            const container = document.getElementById(`cards-${column}`);
            container.ondragover = allowDrop;
            container.ondrop = (e) => drop(e, column);
        });
        
        // Close modal on background click
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });
        
        // Set today's date by default
        document.getElementById('piece-date').value = new Date().toISOString().split('T')[0];
        
        // Initial render
        renderBoard();
    </script>
</body>
</html>
