<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pottery Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdf6f3;
            --surface: #ffffff;
            --surface-soft: #fbf1ee;
            --border: #f0e2dd;
            --border-strong: #e6d2cc;
            --text: #4a3b40;
            --text-muted: #998289;
            --text-faint: #c0adb2;
            --accent: #c98a99;
            --accent-hover: #b9758a;
            --accent-soft: #f8eaee;
            --radius: 20px;
            --shadow-sm: 0 2px 8px rgba(150, 110, 120, 0.05);
            --shadow-md: 0 10px 30px rgba(150, 110, 120, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 32px 28px;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3 {
            font-weight: 600;
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 44px;
        }

        header h1 {
            font-family: 'Fraunces', serif;
            font-size: 44px;
            font-weight: 400;
            font-style: italic;
            color: var(--text);
            letter-spacing: -0.5px;
            margin-bottom: 10px;
        }

        header p {
            font-size: 14px;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .kanban-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        .column {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            padding: 18px;
            min-height: 720px;
            display: flex;
            flex-direction: column;
        }

        .column-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }

        .column-icon {
            font-size: 14px;
            opacity: 0.75;
            flex-shrink: 0;
        }

        .column-title {
            font-family: 'Fraunces', serif;
            font-size: 16px;
            font-weight: 500;
            color: var(--text);
            letter-spacing: 0.1px;
        }

        .column-count {
            margin-left: auto;
            min-width: 22px;
            text-align: center;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            color: var(--text-muted);
            background: var(--accent-soft);
            font-weight: 600;
        }

        .col-add-btn {
            width: 26px;
            height: 26px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-strong);
            background: var(--surface);
            color: var(--accent);
            border-radius: 50%;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .col-add-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .cards-container {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            align-content: start;
            overflow-y: auto;
        }

        .card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 0;
            cursor: grab;
            overflow: hidden;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--border-strong);
        }

        .card:active {
            cursor: grabbing;
        }

        .card-image {
            width: 100%;
            aspect-ratio: 3 / 4;
            background: var(--surface-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: var(--text-faint);
            overflow: hidden;
            position: relative;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-body {
            padding: 7px 9px 9px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .card-title {
            font-family: 'Fraunces', serif;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            line-height: 1.2;
            word-break: break-word;
        }

        .card-date {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .card-actions {
            position: absolute;
            top: 6px;
            right: 6px;
            display: flex;
            gap: 4px;
            z-index: 2;
        }

        .icon-btn {
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(4px);
            box-shadow: 0 1px 4px rgba(74, 59, 64, 0.18);
            border-radius: 50%;
            font-size: 12px;
            line-height: 1;
            color: var(--text);
            cursor: pointer;
            transition: all 0.15s ease;
            padding: 0;
        }

        .icon-btn:hover {
            background: #ffffff;
            transform: scale(1.08);
        }

        .icon-btn.btn-next {
            background: var(--accent);
            color: #fff;
        }

        .icon-btn.btn-next:hover {
            background: var(--accent-hover);
        }

        .icon-btn.btn-delete:hover {
            color: #b3261e;
        }

        .add-card-btn {
            width: 100%;
            padding: 9px;
            background: transparent;
            border: 1px dashed var(--border-strong);
            border-radius: 20px;
            font-family: inherit;
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.18s ease;
            font-weight: 600;
            margin-top: 14px;
        }

        .add-card-btn:hover {
            background: var(--accent-soft);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(33, 31, 28, 0.4);
            backdrop-filter: blur(2px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            border-radius: 16px;
            padding: 28px;
            max-width: 460px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 24px 60px rgba(33, 31, 28, 0.25);
        }

        .modal-header {
            font-family: 'Fraunces', serif;
            font-size: 26px;
            font-weight: 400;
            font-style: italic;
            margin-bottom: 22px;
            color: var(--text);
        }

        .form-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 7px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            padding: 10px 12px;
            border: 1px solid var(--border-strong);
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            color: var(--text);
            background: var(--surface);
            transition: all 0.18s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(176, 106, 79, 0.12);
        }

        .form-group input[type="file"] {
            padding: 8px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .image-preview {
            width: 100%;
            height: 180px;
            background: var(--surface-soft);
            border: 1px solid var(--border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            overflow: hidden;
            font-size: 36px;
            color: var(--text-faint);
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 26px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: 1px solid transparent;
            border-radius: 20px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.18s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text-muted);
            border-color: var(--border-strong);
        }

        .btn-secondary:hover {
            background: var(--surface-soft);
            color: var(--text);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 28px 16px;
            color: var(--text-faint);
        }

        .empty-state-icon {
            font-size: 22px;
            margin-bottom: 10px;
            opacity: 0.6;
        }

        .empty-state-text {
            font-size: 12px;
        }

        @media (max-width: 1100px) {
            .kanban-board {
                grid-template-columns: repeat(2, 1fr);
            }
            .column {
                min-height: 420px;
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 20px 16px;
            }
            header {
                flex-direction: column;
                gap: 4px;
            }
            .kanban-board {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Pottery Journal</h1>
            <p>Track your ceramic pieces through every stage of creation</p>
        </header>

        <div class="kanban-board">
            <div class="column" id="thrown">
                <div class="column-header">
                    <span class="column-icon">🎯</span>
                    <span class="column-title">Thrown</span>
                    <span class="column-count" id="count-thrown">0</span>
                    <button class="col-add-btn" title="Add to Thrown" onclick="openModal('thrown')">+</button>
                </div>
                <div class="cards-container" id="cards-thrown"></div>
            </div>

            <div class="column" id="trimmed">
                <div class="column-header">
                    <span class="column-icon">✂️</span>
                    <span class="column-title">Trimmed</span>
                    <span class="column-count" id="count-trimmed">0</span>
                    <button class="col-add-btn" title="Add to Trimmed" onclick="openModal('trimmed')">+</button>
                </div>
                <div class="cards-container" id="cards-trimmed"></div>
            </div>

            <div class="column" id="bisque">
                <div class="column-header">
                    <span class="column-icon">🔥</span>
                    <span class="column-title">Bisque Fired</span>
                    <span class="column-count" id="count-bisque">0</span>
                    <button class="col-add-btn" title="Add to Bisque Fired" onclick="openModal('bisque')">+</button>
                </div>
                <div class="cards-container" id="cards-bisque"></div>
            </div>

            <div class="column" id="glazed">
                <div class="column-header">
                    <span class="column-icon">🎨</span>
                    <span class="column-title">Glazed</span>
                    <span class="column-count" id="count-glazed">0</span>
                    <button class="col-add-btn" title="Add to Glazed" onclick="openModal('glazed')">+</button>
                </div>
                <div class="cards-container" id="cards-glazed"></div>
            </div>

            <div class="column" id="fired">
                <div class="column-header">
                    <span class="column-icon">✨</span>
                    <span class="column-title">Glaze Fired</span>
                    <span class="column-count" id="count-fired">0</span>
                    <button class="col-add-btn" title="Add to Glaze Fired" onclick="openModal('fired')">+</button>
                </div>
                <div class="cards-container" id="cards-fired"></div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header" id="modal-title">Add New Piece</div>

            <div class="image-preview" id="image-preview">
                <span>📸</span>
            </div>

            <div class="form-group">
                <label>Upload Image</label>
                <input type="file" id="image-input" accept="image/*" onchange="previewImage()">
            </div>

            <div class="form-group">
                <label>Title (optional)</label>
                <input type="text" id="piece-name" placeholder="e.g., Thrown Bowl">
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="piece-description" placeholder="Add notes about your piece..."></textarea>
            </div>

            <div class="form-group">
                <label>Date</label>
                <input type="date" id="piece-date">
            </div>

            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="savePiece()">Save Piece</button>
            </div>
        </div>
    </div>

    <script>
        // Initialize data from localStorage
        let pieces = JSON.parse(localStorage.getItem('pottery-pieces')) || [];
        let currentColumn = null;
        let editingId = null;

        const columns = ['thrown', 'trimmed', 'bisque', 'glazed', 'fired'];

        function renderBoard() {
            columns.forEach(column => {
                const columnPieces = pieces.filter(p => p.column === column);
                const container = document.getElementById(`cards-${column}`);
                const count = document.getElementById(`count-${column}`);

                count.textContent = columnPieces.length;

                if (columnPieces.length === 0) {
                    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">✨</div><div class="empty-state-text">No pieces yet</div></div>';
                } else {
                    container.innerHTML = columnPieces.map(piece => `
                        <div class="card" draggable="true" ondragstart="dragStart(event, '${piece.id}')" ondragend="dragEnd(event)">
                            <div class="card-image">
                                ${piece.image ? `<img src="${piece.image}" alt="${piece.name || 'pottery piece'}">` : '🏺'}
                            </div>
                            <div class="card-actions">
                                ${column !== 'fired' ? `<button class="icon-btn btn-next" title="Move to next stage" onclick="moveToNext('${piece.id}')">→</button>` : ''}
                                <button class="icon-btn" title="Edit" onclick="editPiece('${piece.id}')">✎</button>
                                <button class="icon-btn btn-delete" title="Delete" onclick="deletePiece('${piece.id}')">✕</button>
                            </div>
                            ${(piece.name || piece.date) ? `
                            <div class="card-body">
                                ${piece.name ? `<div class="card-title">${piece.name}</div>` : ''}
                                ${piece.date ? `<div class="card-date">${piece.date}</div>` : ''}
                            </div>` : ''}
                        </div>
                    `).join('');
                }
            });
        }

        function openModal(column) {
            currentColumn = column;
            editingId = null;
            document.getElementById('modal-title').textContent = 'Add New Piece';
            document.getElementById('piece-name').value = '';
            document.getElementById('piece-description').value = '';
            document.getElementById('piece-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('image-input').value = '';
            document.getElementById('image-preview').innerHTML = '<span>📸</span>';
            document.getElementById('modal').classList.add('active');
        }

        function editPiece(id) {
            const piece = pieces.find(p => p.id === id);
            if (!piece) return;

            editingId = id;
            currentColumn = piece.column;
            document.getElementById('modal-title').textContent = 'Edit Piece';
            document.getElementById('piece-name').value = piece.name;
            document.getElementById('piece-description').value = piece.description || '';
            document.getElementById('piece-date').value = piece.date || '';

            if (piece.image) {
                document.getElementById('image-preview').innerHTML = `<img src="${piece.image}" alt="${piece.name}">`;
            } else {
                document.getElementById('image-preview').innerHTML = '<span>📸</span>';
            }

            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            currentColumn = null;
            editingId = null;
        }

        // Downscale + compress an image file to keep localStorage well under quota
        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const maxDim = 1200;
                    let { width, height } = img;
                    if (width > maxDim || height > maxDim) {
                        const scale = Math.min(maxDim / width, maxDim / height);
                        width = Math.round(width * scale);
                        height = Math.round(height * scale);
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', 0.8));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function previewImage() {
            const file = document.getElementById('image-input').files[0];
            if (file) {
                compressImage(file, (dataUrl) => {
                    document.getElementById('image-preview').innerHTML = `<img src="${dataUrl}" alt="preview">`;
                });
            }
        }

        function savePiece() {
            const name = document.getElementById('piece-name').value.trim();
            const imageInput = document.getElementById('image-input');
            const description = document.getElementById('piece-description').value;
            const date = document.getElementById('piece-date').value;

            if (editingId) {
                // Update existing piece
                const piece = pieces.find(p => p.id === editingId);
                if (piece) {
                    piece.name = name;
                    piece.description = description;
                    piece.date = date;
                    piece.column = currentColumn;

                    if (imageInput.files[0]) {
                        compressImage(imageInput.files[0], (dataUrl) => {
                            piece.image = dataUrl;
                            if (saveToDB()) renderBoard();
                            closeModal();
                        });
                    } else {
                        if (saveToDB()) renderBoard();
                        closeModal();
                    }
                }
            } else {
                // Create new piece
                const newPiece = {
                    id: Date.now().toString(),
                    name,
                    description,
                    date,
                    column: currentColumn,
                    image: null
                };

                if (imageInput.files[0]) {
                    compressImage(imageInput.files[0], (dataUrl) => {
                        newPiece.image = dataUrl;
                        pieces.push(newPiece);
                        if (saveToDB()) renderBoard();
                        closeModal();
                    });
                } else {
                    pieces.push(newPiece);
                    if (saveToDB()) renderBoard();
                    closeModal();
                }
            }
        }

        function deletePiece(id) {
            if (confirm('Are you sure you want to delete this piece?')) {
                pieces = pieces.filter(p => p.id !== id);
                saveToDB();
                renderBoard();
            }
        }

        function moveToNext(id) {
            const piece = pieces.find(p => p.id === id);
            if (!piece) return;

            const columnOrder = ['thrown', 'trimmed', 'bisque', 'glazed', 'fired'];
            const currentIndex = columnOrder.indexOf(piece.column);

            if (currentIndex < columnOrder.length - 1) {
                piece.column = columnOrder[currentIndex + 1];
                saveToDB();
                renderBoard();
            }
        }

        function dragStart(e, id) {
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('pieceId', id);
        }

        function dragEnd(e) {
            e.preventDefault();
        }

        function allowDrop(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }

        function drop(e, column) {
            e.preventDefault();
            const pieceId = e.dataTransfer.getData('pieceId');
            const piece = pieces.find(p => p.id === pieceId);
            if (piece) {
                piece.column = column;
                saveToDB();
                renderBoard();
            }
        }

        function saveToDB() {
            try {
                localStorage.setItem('pottery-pieces', JSON.stringify(pieces));
                return true;
            } catch (err) {
                alert('Could not save — your browser storage is full. Try deleting a few pieces or re-adding their photos (newer photos are automatically compressed).');
                return false;
            }
        }

        // Add drag and drop to columns
        columns.forEach(column => {
            const container = document.getElementById(`cards-${column}`);
            container.ondragover = allowDrop;
            container.ondrop = (e) => drop(e, column);
        });

        // Close modal on background click
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });

        // Set today's date by default
        document.getElementById('piece-date').value = new Date().toISOString().split('T')[0];

        // Initial render
        renderBoard();
    </script>
</body>
</html>
